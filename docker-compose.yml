services:
  gateway:
    build: .
    ports:
      - "8000:8000"
    environment:
      AI_PLATFORM_API_KEYS: ${AI_PLATFORM_API_KEYS:-dev-local-key}
      AI_PLATFORM_RATE_LIMIT_REQUESTS: ${AI_PLATFORM_RATE_LIMIT_REQUESTS:-60}
      AI_PLATFORM_RATE_LIMIT_WINDOW_SECONDS: ${AI_PLATFORM_RATE_LIMIT_WINDOW_SECONDS:-60}
      AI_PLATFORM_ANTHROPIC_API_KEY: ${AI_PLATFORM_ANTHROPIC_API_KEY:-}
      AI_PLATFORM_ANTHROPIC_DEFAULT_MODEL: ${AI_PLATFORM_ANTHROPIC_DEFAULT_MODEL:-claude-sonnet-5}
